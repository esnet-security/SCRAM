---
name: Run Translator Tests

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main
      - develop

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  translator:
    name: Run Translator Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: ${{ !env.ACT }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_PULL_AUTH_USER }}
          password: ${{ secrets.DOCKER_HUB_PULL_AUTH_PAT }}

      - name: Check Docker state (pre-build)
        run: docker ps

      - name: Build Docker images
        run: make build

      - name: Migrate Database
        run: make migrate

      - name: Run Application
        run: make run

      - name: Check Docker state (pre-test)
        run: docker ps

      - name: Run Translator Behave Tests
        run: make behave-translator

      - name: Dump docker logs on failure
        if: failure()
        uses: jwalton/gh-docker-logs@v2

      - name: Check Docker state (post-test)
        if: always()
        run: docker ps

